name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  verify-secrets:
    name: Verify Secrets & Environment
    runs-on: ubuntu-latest
    steps:
      - name: Check Sentry DSN
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" ]; then
            echo "❌ NEXT_PUBLIC_SENTRY_DSN is missing"
            exit 1
          else
            echo "✅ NEXT_PUBLIC_SENTRY_DSN is configured"
          fi

      - name: Check PostHog Token
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}" ]; then
            echo "❌ NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN is missing"
            exit 1
          else
            echo "✅ NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN is configured"
          fi

      - name: Check PostHog Host
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}" ]; then
            echo "❌ NEXT_PUBLIC_POSTHOG_HOST is missing"
            exit 1
          else
            echo "✅ NEXT_PUBLIC_POSTHOG_HOST is configured"
          fi

      - name: Check GA ID
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}" ]; then
            echo "❌ NEXT_PUBLIC_GA_MEASUREMENT_ID is missing"
            exit 1
          else
            echo "✅ NEXT_PUBLIC_GA_MEASUREMENT_ID is configured"
          fi

  build:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    needs: verify-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present || echo "Lint script not found, skipping"

      - name: Build
        run: npm run build --if-present || echo "Build script not found, skipping"
